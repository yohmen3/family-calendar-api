databases:
  - name: family-calendar-db
    plan: free
    databaseName: family_calendar

services:
  - type: web
    name: family-calendar-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FAMILY_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: family-calendar-db
          property: connectionString
